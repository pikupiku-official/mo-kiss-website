name: Deploy to Lolipop

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: lolipop-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check PHP syntax
        run: |
          find . -type f -name '*.php' \
            -not -path './.git/*' \
            -print0 | xargs -0 -n1 php -l

      - name: Install deployment tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes sshpass rsync

      - name: Add deployment version
        run: printf '%s\n' "$GITHUB_SHA" > deploy-version.txt

      - name: Prepare remote directory
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSHPASS: ${{ secrets.SSH_PASS }}
        run: |
          test -n "$SSH_HOST"
          test -n "$SSH_USER"
          test -n "$SSH_PORT"
          test -n "$SSHPASS"
          sshpass -e ssh \
            -p "$SSH_PORT" \
            -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST" \
            'test -d "$HOME/web" && mkdir -p "$HOME/web/mokiss"'

      - name: Deploy with rsync
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSHPASS: ${{ secrets.SSH_PASS }}
        run: |
          sshpass -e rsync -avz \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='includes/config.local.php' \
            --exclude='includes/config.local.example.php' \
            --exclude='database.sql' \
            --exclude='test_connection.php' \
            --exclude='scratch/' \
            --exclude='*.md' \
            --exclude='スクリーンショット*' \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no" \
            ./ "$SSH_USER@$SSH_HOST:~/web/mokiss/"

      - name: Verify deployment
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSHPASS: ${{ secrets.SSH_PASS }}
        run: |
          REMOTE_SHA="$(sshpass -e ssh \
            -p "$SSH_PORT" \
            -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST" \
            'cat "$HOME/web/mokiss/deploy-version.txt"')"
          test "$REMOTE_SHA" = "$GITHUB_SHA"

          PUBLIC_SHA="$(curl --fail --silent --show-error \
            "https://mokiss.jp/deploy-version.txt?sha=$GITHUB_SHA")"
          test "$PUBLIC_SHA" = "$GITHUB_SHA"
