<h2>ゲームシステム</h2>
<p>本作は、テキストを読み進めながら選択肢を選ぶことで物語が分岐する、恋愛アドベンチャーゲームです。</p>
<h3>基本システム</h3>
<ul>
    <li>期間：1999年5月31日〜7月31日</li>
    <li>ゲーム内時間は1日ずつ進み、世界の終末へと近づいていきます。</li>
    <li>限られた時間での行動が、少女たちとのエンディングに影響します。</li>
</ul>
<h3>特徴</h3>
<ul>
    <li>1999年風の色調と画質で描かれる「あの頃の景色」</li>
    <li>対応プラットフォーム：Steam</li>
</ul>
