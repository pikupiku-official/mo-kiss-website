<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html lang="ja">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>モーキス 公式サイト</title>
    <link rel="stylesheet" href="css/retro.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a0813;
            background: linear-gradient(135deg, #1a0813 0%, #4a1224 100%);
        }
        /* 固定解像度 800x600 のワークスペース */
        .workspace {
            width: 800px;
            height: 600px;
            display: flex;
            border: 4px ridge #ff66cc;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            position: relative;
            background: #1a0813;
            box-sizing: border-box;
            margin-top: 20px; /* BGMコントロールのスペースを空ける */
        }
        .frame-menu {
            width: 180px;
            height: 100%;
            border: none;
            border-right: 3px ridge #ff66cc;
        }
        .frame-content {
            flex: 1;
            height: 100%;
            border: none;
            background: #1a0813;
        }
        /* 親フレーム右上に絶対配置する BGM コントロール */
        .bgm-parent-control {
            position: absolute;
            top: -35px;
            right: 0;
            background: #1a0813;
            border: 2px ridge #ff66cc;
            padding: 3px 8px;
            z-index: 9999;
            display: flex;
            align-items: center;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }
        .bgm-parent-control button {
            background: #e6007e;
            color: #ffffff;
            border-top: 1px solid #ff66cc;
            border-left: 1px solid #ff66cc;
            border-right: 1px solid #4a1224;
            border-bottom: 1px solid #4a1224;
            padding: 2px 6px;
            margin-left: 5px;
            cursor: pointer;
            font-size: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="workspace">
        <!-- BGMコントロール -->
        <div class="bgm-parent-control">
            <span style="color: #ffcc00; font-size: 11px; font-weight: bold;">♪ BGM:</span>
            <button id="bgm-on" onclick="playBgm()">ON</button>
            <button id="bgm-off" onclick="stopBgm()">OFF</button>
        </div>
        
        <iframe src="menu.html" name="menu" class="frame-menu" scrolling="no"></iframe>
        <iframe src="home.php" name="content" id="content-frame" class="frame-content"></iframe>
    </div>
    
    <script src="js/retro.js"></script>
    <script>
        (function () {
            var pages = {
                home: 'home.php',
                character: 'character.php',
                system: 'system.php',
                gallery: 'construction.html',
                download: 'construction.html',
                bbs: 'construction.html',
                link: 'link.php'
            };

            function showHashPage() {
                var pageName = window.location.hash.substring(1).toLowerCase();
                var pageUrl = pages[pageName] || pages.home;
                var contentFrame = document.getElementById('content-frame');

                if (contentFrame.getAttribute('src') !== pageUrl) {
                    contentFrame.setAttribute('src', pageUrl);
                }
            }

            window.addEventListener('hashchange', showHashPage);
            showHashPage();
        }());
    </script>
</body>
</html>
